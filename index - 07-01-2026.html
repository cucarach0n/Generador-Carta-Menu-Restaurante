<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link href="https://fonts.googleapis.com/css?family=Lobster" rel="stylesheet" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
		crossorigin="anonymous"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/1.3.4/jspdf.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"
		integrity="sha512-894YE6QWD5I59HgZOGReFYm4dnWc1Qt5NtvYSaNcOP+u1T9qYdvdihz0PPSiiqn/+/3e7Jo4EaG7TubfWGUrMQ=="
		crossorigin="anonymous" referrerpolicy="no-referrer"></script>
	<title>Document</title>
	<link rel="stylesheet" href="css/style.css">
	<style>
		@media (max-width: 992px) {
			#generador {
				border-bottom-style: ridge !important;
			}
		}

		@media (min-width: 993px) {
			#generador {
				border-right-style: ridge !important;
			}
		}

		/* Estilos responsive para canvas de vista previa */
		#canvasPreview {
			border-radius: 5px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
			border: 1px solid #dee2e6;
			display: block;
			max-width: 100%;
			height: auto;
		}

		/* Ajustes para móviles */
		@media (max-width: 576px) {

			/* Ajustar el layout del editor de precio en móviles */
			.col-7.text-end h2,
			.col-5.text-end h2 {
				font-size: 1.2rem;
			}

			/* Hacer el input de precio más pequeño en móviles */
			#inputPrecioMenu {
				width: 55px !important;
				font-size: 0.85rem;
				padding: 0.2rem 0.3rem !important;
			}

			/* Hacer los botones más pequeños en móviles */
			.btn-sm {
				font-size: 0.7rem;
				padding: 0.1rem 0.3rem !important;
			}

			/* Ajustar gap en el editor de precio */
			#lblPrecio .d-inline-flex {
				gap: 0.25rem !important;
			}
		}
	</style>
</head>

<body>

	<!--
    price start
    ============================ -->
	<div class="container">

		<div class="row justify-content-center border border-success rounded border-2">
			<div class="col-12">
				<div class="container">
					<div class="row justify-content-center">
						<div class="col-12 text-center">
							<h1>GENERADOR DE CARTA</h1>
						</div>
						<div class="col-8 col-sm-6 col-md-4 col-xl-3 text-center">
							<img src="imagenes/soloLogo.png" class="img-fluid" alt="Logo el Mixto">
						</div>
					</div>
				</div>
			</div>
			<div class="col-12 col-lg-5" style="padding: 10px;">
				<div class="container ">
					<div class="row ">
						<div class="col-7 text-end">
							<h2>
								MENÚ
							</h2>
						</div>
						<div class="col-5 text-end">
							<h2>
								<span id="lblPrecio" onclick="editarPrecioMenu();" style="cursor: pointer;"
									title="Click para editar">S/. 7.50</span>
							</h2>
						</div>

					</div>
					<div class="row justify-content-center">
						<hr class="col-9" style="margin-bottom: 5px;">
						<hr class="col-7">
					</div>
					<div class="row justify-content-center">
						<div class="col-12">
							<label for="selectEntrada" style="font-weight: bold;" class="form-label">
								Entrada
								<i class="bi bi-plus-circle" onclick="agregarProductoInline(1);"
									style="cursor: pointer; margin-left: 5px; font-size: 0.85em; color: #28a745;"
									title="Agregar producto"></i>
							</label>
							<ul class="list-group" id="selectEntrada">
								<li class="list-group-item d-flex justify-content-between align-items-center">
									Vacio...
								</li>
							</ul>
						</div>
						<div class="col-12">
							<label for="selectSegundo" style="font-weight: bold;" class="form-label">
								Segundo
								<i class="bi bi-plus-circle" onclick="agregarProductoInline(2);"
									style="cursor: pointer; margin-left: 5px; font-size: 0.85em; color: #28a745;"
									title="Agregar producto"></i>
							</label>
							<ul class="list-group" id="selectSegundo">
								<li class="list-group-item d-flex justify-content-between align-items-center">
									Vacio...
								</li>
							</ul>
						</div>
						<div class="col-12">
							<label for="selectExtra" style="font-weight: bold;" class="form-label">
								Extra
								<i class="bi bi-plus-circle" onclick="agregarProductoInline(3);"
									style="cursor: pointer; margin-left: 5px; font-size: 0.85em; color: #28a745;"
									title="Agregar producto"></i>
							</label>
							<ul class="list-group" id="selectExtra">
								<li class="list-group-item d-flex justify-content-between align-items-center">
									Vacio...
								</li>
							</ul>
						</div>
						<div class="col-12">
							<label for="selectBebida" style="font-weight: bold;" class="form-label">
								Bebida
								<i class="bi bi-plus-circle" onclick="agregarProductoInline(4);"
									style="cursor: pointer; margin-left: 5px; font-size: 0.85em; color: #28a745;"
									title="Agregar producto"></i>
							</label>
							<ul class="list-group" id="selectBebida">
								<li class="list-group-item d-flex justify-content-between align-items-center">
									Vacio...
								</li>
							</ul>
						</div>


					</div>

					<div class="row justify-content-center" style="padding: 5px;">
						<div class="col-12 text-center">
							<label for="btnGroupOpciones" style="margin-top: 5px;margin-bottom: 0px;"
								class="form-label">Opciones</label>
						</div>
						<div class="col-12 text-center">

							<div id="btnGroupOpciones" class="btn-group btn-group-lg" role="group"
								aria-label="Basic mixed styles example">
								<!--<button onclick="editarProducto();" type="button" class="btn btn-success">
									<i class="bi bi-pencil-fill"></i>
								</button>
								<button onclick="eliminarProducto();" type="button" class="btn btn-danger">
									<i class="bi bi-trash-fill"></i>
								</button>-->
								<button onclick="subirPosicionProducto();" type="button" class="btn btn-info">
									<i class="bi bi-caret-up-fill"></i>
								</button>
								<button onclick="bajarPosicionProducto();" type="button" class="btn btn-primary">
									<i class="bi bi-caret-down-fill"></i>
								</button>
							</div>
						</div>
					</div>
					<div class="row justify-content-center" style="padding: 5px;">
						<div class="col-12 text-center" style="margin-bottom: 10px;">
							<label for="inputImagenFondo" class="form-label" style="font-weight: bold;">Imagen de Fondo
								de
								la Carta</label>
						</div>
						<div class="col-12 text-center" style="margin-bottom: 15px;">
							<!-- Vista previa de la imagen actual -->
							<div id="contenedorVistaPrevia"
								style="margin-bottom: 15px; border: 2px solid #dee2e6; border-radius: 8px; padding: 10px; background-color: #f8f9fa;">
								<p style="margin: 5px 0; font-size: 14px; color: #6c757d;">Vista Previa Actual:</p>
								<div style="position: relative; display: inline-block;">
									<img id="vistaPreviewImagenFondo" src="" alt="Vista previa"
										style="display: none; max-width: 100%; max-height: 150px; border-radius: 5px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
									<!-- Canvas para vista previa del menú -->
									<canvas id="canvasPreview" width="450" height="318"></canvas>
									<div id="loadingIndicator"
										style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,255,255,0.9); padding: 10px; border-radius: 5px;">
										<div class="spinner-border spinner-border-sm text-primary" role="status">
											<span class="visually-hidden">Cargando...</span>
										</div>
										<span style="margin-left: 5px; font-size: 12px;">Cargando...</span>
									</div>
								</div>
							</div>
							<!-- Input para seleccionar nueva imagen -->
							<label for="inputImagenFondo" class="btn btn-primary"
								style="cursor: pointer; margin-bottom: 5px;">
								<i class="bi bi-image"></i> Seleccionar Nueva Imagen
							</label>
							<input type="file" id="inputImagenFondo" class="d-none" accept="image/*"
								onchange="cambiarImagenFondo(event);">
							<button type="button" class="btn btn-secondary" onclick="restaurarImagenPorDefecto();"
								style="margin-left: 5px; margin-bottom: 5px;">
								<i class="bi bi-arrow-counterclockwise"></i> Restaurar Original
							</button>
							<br>
							<small class="form-text text-muted">Formatos soportados: JPG, PNG, GIF</small>
						</div>
					</div>
					<div class="row justify-content-center" style="padding: 5px;">
						<!--<div class="col-4 text-center">
							<input type="button" id="btnDownload" value="Descargar PDF" class="btn btn-primary">
						</div>-->
						<!--<div class="col-6 text-center">
							<input type="button" id="btnLimpiar" onclick="limpiarCanvas();" value="Limpiar"
								class="btn btn-primary">
						</div>
						<div class="col-6 text-center">
							<input type="button" id="btnDibujar" onclick="draw();" value="Dibujar"
								class="btn btn-primary">
						</div>-->
						<div class="col-6 text-center" style="padding: 5px;">
							<!-- Button trigger modal -->
							<button type="button" class="btn btn-primary" data-bs-toggle="modal"
								data-bs-target="#modalPreview">
								Vista Preliminar
							</button>
						</div>
					</div>
				</div>
			</div>

		</div>

	</div>

	<!--<div class="row justify-content-center" style="padding: 5px;">
			<div class="col-12 text-center">
				<div class="contenedor">
					
				</div>
				
			</div>
		</div>-->

	</div>
	<!-- Modal -->
	<div class="modal fade" id="modalPreview" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered modal-lg">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="exampleModalLabel">Vista preliminar de la carta</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<div class="modal-body">
					<canvas class="lienzo img-fluid" id="canvasCarta" width="1123" height="794"
						style="border: red 5px dotted;"></canvas>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cerrar</button>
					<button onclick="print();" type="button" class="btn btn-primary">Descargar PDF</button>
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="modalEditar" tabindex="-1" aria-labelledby="exampleModalLabel2" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="exampleModalLabel2">Alerta</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<div class="modal-body" id="modalAlertaError">
					<p>Deves seleccionar un elemento de la carta para editarlo</p>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-success" data-bs-dismiss="modal">Entiendo</button>
				</div>
			</div>
		</div>
	</div>
	<script src="js/imagenFondo.js"></script>
	<script src="js/gestionCategorias.js"></script>
	<script src="js/preview.js"></script>
	<script src="js/source.js"></script>
</body>

</html>
